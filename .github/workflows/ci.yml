name: DELEGADO CI

on:
  push:
    branches: [main, develop, '**']
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Quality Gates
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint || true
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit || true
        continue-on-error: true

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: HELL Audit
        run: |
          echo "=== HELL Artifacts Check ==="
          for dir in specs tdd decisions; do
            if [ -d "$dir" ]; then
              echo "✅ $dir exists"
              echo "   $(find $dir -name '*.md' | wc -l) files"
            else
              echo "⚠️  $dir missing"
            fi
          done

      - name: Complexity check
        run: |
          echo "=== Complexity Check ==="
          if [ -d "src" ]; then
            find src -name "*.ts" -o -name "*.js" | head -20 | while read f; do
              loc=$(wc -l < "$f")
              if [ $loc -gt 200 ]; then
                echo "⚠️  $f: $loc LOC (exceeds 200)"
              fi
            done
          fi

  delegated-check:
    name: Delegado OS Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check structure
        run: |
          echo "=== Delegado OS Structure ==="
          [ -f "delegado.sh" ] && echo "✅ delegado.sh" || echo "❌ delegado.sh missing"
          [ -f "SKILL.md" ] && echo "✅ SKILL.md" || echo "❌ SKILL.md missing"
          [ -f "kernel/hell/HELL-CORE-ENGINE.md" ] && echo "✅ HELL CORE ENGINE" || echo "❌ HELL CORE ENGINE missing"
          [ -d "kernel/skills" ] && echo "✅ Skills directory" || echo "❌ Skills missing"
          [ -d "templates/hell" ] && echo "✅ HELL templates" || echo "❌ Templates missing"

      - name: Run Delegado CLI
        run: |
          chmod +x delegado.sh
          ./delegado.sh status 2>/dev/null || echo "Status check complete"

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Audit dependencies
        run: npm audit --audit-level=high || true
        continue-on-error: true

  build:
    name: Build Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm install

      - name: Build
        run: npm run build || true
        continue-on-error: true
