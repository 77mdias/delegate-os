# Workflow: BMad Method

## 4 Fases

| Fase | Nome | Opcional | Artefatos |
|------|------|----------|-----------|
| 1 | ANALYSIS | Sim | proposal.md |
| 2 | PLANNING | Não | PRD, specs |
| 3 | SOLUTIONING | - | Architecture, design |
| 4 | IMPLEMENTATION | - | Tasks, código |

## Fase 1: Analysis (Opcional)
```
❓ Questionar contexto
📊 Research
💡 Brainstorm
```

## Fase 2: Planning (Required)
```
📋 Criar PRD
🎯 Definir requirements
📊 Mapear user journeys
```

## Fase 3: Solutioning
```
🏗️ Criar arquitetura
📐 Design técnico
📝 ADR decisions
```

## Fase 4: Implementation
```
⚡ Implementar
🧪 Testar
✅ Validar
```
