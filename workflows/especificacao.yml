# Workflow: Especificação (OpenSpec-Inspired)

## Fluxo

```
proposal ──► specs ──► design ──► tasks ──► implement
    │           │          │          │
   why        what       how       steps
 + scope   changes    approach   to take
```

## Comandos

| Comando | Função |
|---------|--------|
| `/propose [nome]` | Criar change proposal |
| `/specs` | Criar spec |
| `/design` | Criar design |
| `/tasks` | Gerar tasks |
| `/apply` | Aplicar tasks |
| `/verify` | Verificar implementação |
| `/archive` | Arquivar change |

## Artifactos

### proposal.md
```markdown
# Proposal: [nome]

## Contexto
[Por que isso é necessário]

## Problema
[O que estamos resolvendo]

## Impacto
[O que acontece se não fizermos]

## Escopo
### Dentro
- [x] ...

### Fora
- [ ] ...
```

### specs/**/*.md
```markdown
# Specs: [feature]

## Funcionalidade
### Cenário 1
Dado [contexto]
Quando [ação]
Então [resultado]

## Critérios de Aceite
- [ ] ...
```

### design.md
```markdown
# Design: [feature]

## Arquitetura
[Decisões técnicas]

## Estrutura
[Files/dirs]

## Integrações
[APIs, serviços]

## Riscos
- [x] ...
```
